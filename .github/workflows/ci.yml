name: ci

on:
  push:
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: blunder
          POSTGRES_PASSWORD: blunder
          POSTGRES_DB: blunder
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U blunder -d blunder"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg2://blunder:blunder@localhost:5432/blunder
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Alembic upgrade
        run: alembic upgrade head
      - name: Pytest
        run: pytest -q

  compose-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare env
        run: cp .env.example .env
      - name: Validate compose
        run: docker compose config
      - name: Build images
        run: docker compose build api worker

  engine-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Stockfish
        run: |
          curl -sSL -o /tmp/sf.tar \
            https://github.com/official-stockfish/Stockfish/releases/download/sf_18/stockfish-ubuntu-x86-64.tar
          tar -xf /tmp/sf.tar -C /tmp
          sudo install -m 0755 /tmp/stockfish/stockfish-ubuntu-x86-64 /usr/local/bin/stockfish
      - name: Configure & build engine
        run: |
          cmake -S engine -B engine/build -DCMAKE_BUILD_TYPE=Release
          cmake --build engine/build -j
      - name: Catch2 suite (sign conventions + determinism)
        run: ctest --test-dir engine/build --output-on-failure

  engine-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pinned Stockfish
        run: |
          curl -sSL -o /tmp/sf.tar \
            https://github.com/official-stockfish/Stockfish/releases/download/sf_18/stockfish-ubuntu-x86-64.tar
          tar -xf /tmp/sf.tar -C /tmp
          sudo install -m 0755 /tmp/stockfish/stockfish-ubuntu-x86-64 /usr/local/bin/stockfish
      - name: Build & install the blunder_engine wheel
        run: pip install ./engine
      - name: Wheel smoke test
        run: python engine/tests/smoke_wheel.py
