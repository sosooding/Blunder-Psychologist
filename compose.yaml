name: blunder-psychologist

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: blunder
      POSTGRES_PASSWORD: blunder
      POSTGRES_DB: blunder
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blunder -d blunder"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command: alembic upgrade head
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command: uvicorn blunder.api:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    command: python -m blunder.worker
    env_file: .env
    depends_on:
      migrate:
        condition: service_completed_successfully

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"

volumes:
  pgdata:
